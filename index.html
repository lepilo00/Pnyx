<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PNYX Athens — discover the hidden site of Athenian democracy. A self-guided audio experience on the Pnyx hill, 20 minutes from the Acropolis." />
    <meta name="theme-color" content="#f7f1e3" />
    <title>PNYX Athens — The Hidden Site of Athenian Democracy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap" />
    <!-- Prevent dark-mode flash on load -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('dw-theme')
          var d = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (t === 'dark' || (!t && d)) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
