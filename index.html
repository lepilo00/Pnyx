<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Democracy Walk — a free self-guided educational audio walk to the Pnyx in Athens, the birthplace of democracy." />
    <meta name="theme-color" content="#d97706" />
    <title>Democracy Walk — Pnyx, Athens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap" />
    <!-- Prevent dark-mode flash on load -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('dw-theme')
          var d = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (t === 'dark' || (!t && d)) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
